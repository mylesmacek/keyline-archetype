<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title is set dynamically by render.js from config -->
  <title>Loading…</title>

  <!-- Google Fonts preconnect (actual import injected by render.js) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!--
    All HTML is generated by render.js reading SITE config.
    To rebrand: edit js/config.js only.
    To restyle: edit css/styles.css only.
    To add/remove sections: edit js/render.js only.
  -->

  <!-- 1. Content config -->
  <script src="js/config.js"></script>

  <!-- 2. Component renderer -->
  <script src="js/render.js"></script>

  <!-- 3. Boot -->
  <script>
    Render.mount(SITE, {
      sections: ['nav', 'hero', 'marquee', 'testimonial', 'cta', 'footer']
    });
  </script>
</body>
</html>
